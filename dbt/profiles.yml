ad_spend_optimizer:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: ad_spend_dbt
      keyfile: "{{ env_var('GCP_CREDENTIALS_PATH') }}"
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive

    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: ad_spend_prod
      keyfile: "{{ env_var('GCP_CREDENTIALS_PATH') }}"
      threads: 8
      timeout_seconds: 600
      location: US
      priority: batch
